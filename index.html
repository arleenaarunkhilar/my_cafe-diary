<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Diary</title>
    
    <!-- Google Fonts: Quicksand (UI) and Caveat (Notes/Handwriting) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        ui: ['Quicksand', 'sans-serif'],
                        notes: ['Caveat', 'cursive'],
                    },
                    colors: {
                        pastel: {
                            pink: '#fce4ec',
                            blue: '#e3f2fd',
                            green: '#e8f5e9',
                            yellow: '#fffde7',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-white/40 backdrop-blur-md border border-white/50 shadow-[0_8px_32px_0_rgba(31,38,135,0.1)];
            }
            .polaroid {
                @apply bg-white p-3 pb-12 shadow-lg hover:shadow-xl transition-shadow duration-300;
            }
            .washi-tape {
                @apply absolute h-6 opacity-80 backdrop-blur-sm mix-blend-multiply shadow-sm;
            }
            
            /* Remove scrollbar for a cleaner look */
            ::-webkit-scrollbar {
                width: 8px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.5);
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.8);
            }
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="font-ui text-gray-800 antialiased overflow-x-hidden selection:bg-pink-200 selection:text-[#800000]">
    <!-- 
        PINTEREST BACKGROUND IMAGE URL HERE:
        Replace the url below with your desired Pinterest image URL.
    -->
    <div class="fixed inset-0 z-[-1] bg-cover bg-center bg-no-repeat transition-all duration-1000" 
         style="background-image: url('images/download (11).jpg');">
        <!-- Soft overlay to make text readable -->
        <div class="absolute inset-0 bg-white/30 backdrop-blur-[2px]"></div>
    </div>

    <div id="root" class="min-h-screen relative p-4 md:p-8"></div>

    <!-- Application Code -->
    <script type="text/babel" src="app.jsx?v=4"></script>
</body>
</html>
